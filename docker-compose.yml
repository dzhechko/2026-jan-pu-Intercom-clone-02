# КоммуниК — Docker Compose
# Reference: docs/C4-diagrams.md Deployment Diagram, ADR-012

services:
  # Next.js 14 + Node.js API + Socket.io
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # Next.js
      - "4000:4000"   # API + WebSocket
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kommuniq:kommuniq@postgres:5432/kommuniq
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Worker: Revenue Report cron, notification processing
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kommuniq:kommuniq@postgres:5432/kommuniq
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # PostgreSQL 16 (ADR-004)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kommuniq
      POSTGRES_PASSWORD: kommuniq
      POSTGRES_DB: kommuniq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Remove in production
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kommuniq"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 7 — Streams + Sessions + Socket.io adapter (ADR-005, ADR-006)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"  # Remove in production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Nginx reverse proxy + SSL
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - external
      - internal
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
